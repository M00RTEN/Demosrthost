<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT.STEALTH | Professional Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --card: #16161d;
            --accent: #8b5cf6;
            --text: #e2e8f0;
            --dim: #64748b;
            --border: #2d2d3d;
            --red: #ef4444;
            --green: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 40px;
        }

        .dashboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        th {
            text-align: left;
            color: var(--dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0 20px;
        }

        .stream-row {
            background-color: var(--card);
            transition: 0.2s;
        }

        .stream-row td {
            padding: 20px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stream-row td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .stream-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }

        /* Status & Indicators */
        .status-cell { display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
        .dot.live { background: var(--green); box-shadow: 0 0 10px var(--green); }

        /* Stat Boxes */
        .stat-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .stat-label { font-size: 0.6rem; color: var(--dim); display: block; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: bold; }

        /* Links & Buttons */
        .link-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .link-label { font-size: 0.75rem; width: 100px; color: var(--dim); }
        .url-input { 
            background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; flex: 1;
        }

        .btn {
            background: #2d2d3d; border: none; color: white; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }
        .btn:hover { background: var(--accent); }

        .btn-preview {
            background: var(--accent);
            width: 100%; margin-top: 10px;
            padding: 10px;
        }

        /* Video Modal */
        #preview-modal {
            display: none;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; background: #000; border: 2px solid var(--accent);
            z-index: 1000; border-radius: 16px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .modal-header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; }
        .video-container { aspect-ratio: 16/9; background: #050505; display: flex; align-items: center; justify-content: center; }
        .overlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; }
    </style>
</head>
<body>

<h2 style="margin-bottom: 30px;">SRT.STEALTH <span style="color: var(--dim); font-weight: 300;">Command Center</span></h2>

<table class="dashboard-table">
    <thead>
        <tr>
            <th>Stream</th>
            <th>Status</th>
            <th>Metrics & Monitoring</th>
            <th>OBS Seere</th>
            <th>Lenker</th>
        </tr>
    </thead>
    <tbody id="stream-body">
        </tbody>
</table>

<div class="overlay" id="overlay" onclick="closePreview()"></div>
<div id="preview-modal">
    <div class="modal-header">
        <span id="modal-title" style="font-weight: bold;">PREVIEW: MAIN_PATH</span>
        <i class="fas fa-times" style="cursor:pointer;" onclick="closePreview()"></i>
    </div>
    <div class="video-container">
        <div style="text-align: center;">
            <div class="dot live" style="margin: 0 auto 10px;"></div>
            <p id="video-status" style="font-family: monospace;">CONNECTING TO DECODER...</p>
            <div style="font-size: 0.7rem; color: var(--dim);">SRT-IP: 84.212.xx.xx | Latency: 120ms</div>
        </div>
    </div>
</div>

<script>
    const streams = [
        { id: 'main', name: 'MAIN PRODUCTION', port: 10001, bitrate: '6.50', viewers: 12 },
        { id: 'backup', name: 'BACKUP PATH', port: 10002, bitrate: '0.00', viewers: 0 },
        { id: 'mobile', name: 'SRTLA MOBILE', port: 10003, bitrate: '4.20', viewers: 1 },
        { id: 'guest', name: 'GUEST INVITE', port: 10004, bitrate: '0.00', viewers: 0 },
        { id: '4k', name: '4K MASTER', port: 10005, bitrate: '12.40', viewers: 3 }
    ];

    function renderStreams() {
        const body = document.getElementById('stream-body');
        body.innerHTML = streams.map(s => `
            <tr class="stream-row">
                <td>
                    <div style="font-weight: bold; font-size: 0.9rem;">${s.name}</div>
                    <div style="font-size: 0.7rem; color: var(--dim);">Port: ${s.port}</div>
                </td>
                <td>
                    <div class="status-cell">
                        <div class="dot ${s.bitrate > 0 ? 'live' : ''}"></div>
                        <span style="color: ${s.bitrate > 0 ? 'var(--green)' : 'var(--red)'}; font-weight: bold; font-size: 0.8rem;">
                            ${s.bitrate > 0 ? 'ONLINE' : 'OFFLINE'}
                        </span>
                    </div>
                </td>
                <td>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <div class="stat-box">
                            <span class="stat-label">BITRATE</span>
                            <span class="stat-value">${s.bitrate} Mbps</span>
                        </div>
                        <button class="btn btn-preview" onclick="openPreview('${s.name}')">
                            <i class="fas fa-play"></i> START PREVIEW
                        </button>
                    </div>
                </td>
                <td>
                    <div class="stat-box">
                        <span class="stat-label">OBS-SEERE</span>
                        <span class="stat-value">${s.viewers}</span>
                    </div>
                </td>
                <td>
                    <div class="link-item">
                        <span class="link-label"><i class="fas fa-mobile-alt"></i> Mobil / Backpack</span>
                        <input class="url-input" readonly value="srt://oslo.stealth.no:${s.port}?id=pub">
                        <button class="btn" onclick="copy(this)">COPY</button>
                    </div>
                    <div class="link-item">
                        <span class="link-label"><i class="fas fa-desktop"></i> OBS (read)</span>
                        <input class="url-input" readonly value="srt://oslo.stealth.no:${s.port}?id=play">
                        <button class="btn" onclick="copy(this)">COPY</button>
                    </div>
                    <div class="link-item">
                        <span class="link-label"><i class="fas fa-chart-bar"></i> Stats / API</span>
                        <input class="url-input" readonly value="http://stats.stealth.no/${s.id}">
                        <button class="btn" onclick="copy(this)">COPY</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function openPreview(name) {
        document.getElementById('modal-title').innerText = "PREVIEW: " + name;
        document.getElementById('preview-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        
        let status = document.getElementById('video-status');
        status.innerText = "INITIALIZING DECODER...";
        setTimeout(() => { status.innerText = "BUFFERING SRT STREAM..."; }, 1000);
        setTimeout(() => { status.innerHTML = "<span style='color:var(--green)'>RECEIVING H.264 DATA</span>"; }, 2500);
    }

    function closePreview() {
        document.getElementById('preview-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function copy(btn) {
        const input = btn.parentElement.querySelector('input');
        input.select();
        document.execCommand('copy');
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.background = "var(--green)";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "";
        }, 2000);
    }

    renderStreams();
</script>

</body>
</html>
