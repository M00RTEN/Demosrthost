<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT.STEALTH | Enterprise Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card-bg: rgba(20, 20, 35, 0.7);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --pink: #ec4899;
            --green: #10b981;
            --red: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            color: white; margin: 0; min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(to right, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Path Cards */
        .path-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        
        .path-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 20px; padding: 25px; transition: 0.3s;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .path-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .status-badge { 
            padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; 
            font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: inline-block;
        }
        .online { background: rgba(16, 185, 129, 0.1); color: var(--green); border: 1px solid var(--green); }
        .offline { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }

        .path-title { font-size: 1.2rem; font-weight: 700; margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        
        .stats-mini { display: flex; gap: 15px; margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); display: block; }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-weight: bold; font-size: 0.9rem; }

        /* Action Buttons */
        .link-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        .copy-link { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; font-size: 0.8rem;
        }
        .copy-link:hover { background: rgba(255,255,255,0.1); color: var(--accent); }
        .copy-link i { color: var(--text-dim); }

        .btn-main {
            background: linear-gradient(135deg, var(--accent), var(--pink));
            color: white; border: none; padding: 15px 30px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%;
        }

        /* Hero / Login */
        #login-screen { text-align: center; max-width: 500px; margin: 100px auto; }
        .input-field { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); border-radius: 12px; 
            color: white; margin-bottom: 15px; box-sizing: border-box;
        }

        .visual-pulse {
            height: 3px; width: 100%; background: var(--border);
            position: relative; overflow: hidden; margin-top: 15px; border-radius: 2px;
        }
        .pulse-bar {
            height: 100%; width: 30%; background: var(--accent);
            position: absolute; animation: moveBar 2s infinite linear;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes moveBar {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">SRT.STEALTH <span style="font-weight: 300; font-size: 0.8rem; color: var(--text-dim);">V2.5</span></div>
    <div id="user-display" style="font-size: 0.9rem; font-weight: bold;"></div>
</nav>

<div class="container">
    <div id="login-screen">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">Cloud Node</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Skriv inn ditt kallenavn for å generere dine SRT-baner.</p>
        <input type="text" id="streamer-name" class="input-field" placeholder="f.eks. KrisLive">
        <button class="btn-main" onclick="initDashboard()">GENERER DASHBORD</button>
    </div>

    <div id="main-dash" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Aktive Strømmer</h2>
            <div style="color: var(--green); font-size: 0.8rem;"><i class="fas fa-shield-halved"></i> KRYPTERING AKTIV (AES-128)</div>
        </div>
        
        <div class="path-grid" id="path-container">
            </div>
    </div>
</div>

<script>
    const PATHS = [
        { id: 'main', name: 'Main Production', port: 10001, desc: 'Hovedbane for OBS' },
        { id: 'backup', name: 'Safe Backup', port: 10002, desc: 'Sekundær failover' },
        { id: 'mobile', name: 'Mobile SRTLA', port: 10003, desc: 'Optimert for 4G/5G bonding' },
        { id: '4k', name: 'Ultra 4K', port: 10004, desc: 'Høy bitrate bane' },
        { id: 'lowlat', name: 'Sub-Second', port: 10005, desc: 'Minimum delay bane' }
    ];

    function initDashboard() {
        const name = document.getElementById('streamer-name').value;
        if (!name) return alert("Vennligst skriv et navn");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-dash').style.display = 'block';
        document.getElementById('user-display').innerText = `NODE: ${name.toUpperCase()}`;

        const container = document.getElementById('path-container');
        
        PATHS.forEach(path => {
            const streamId = `${name}_${path.id}`;
            const srtUrl = `srt://oslo.srt.stealth:${path.port}?streamid=pub_${streamId}`;
            const obsUrl = `srt://oslo.srt.stealth:${path.port}?streamid=play_${streamId}`;
            const statsUrl = `https://stats.srt.stealth/${name}/${path.id}`;

            container.innerHTML += `
                <div class="path-card">
                    <div class="status-badge online" id="status-${path.id}">Live</div>
                    <div class="path-title"><i class="fas fa-tower-broadcast" style="color: var(--accent);"></i> ${path.name}</div>
                    <p style="font-size: 0.75rem; color: var(--text-dim); margin: 0;">${path.desc}</p>
                    
                    <div class="stats-mini">
                        <div class="stat-item">
                            <span class="stat-label">BITRATE</span>
                            <span class="stat-val" id="br-${path.id}" style="color: var(--accent);">0.00 Mbps</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">RTT</span>
                            <span class="stat-val" id="rtt-${path.id}">24ms</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">LOSS</span>
                            <span class="stat-val" style="color: var(--green);">0%</span>
                        </div>
                    </div>

                    <div class="link-group">
                        <div class="copy-link" onclick="copyText('${srtUrl}')">
                            <span><i class="fas fa-mobile-alt"></i> Mobil Link (Larix)</span>
                            <i class="fas fa-copy"></i>
                        </div>
                        <div class="copy-link" onclick="copyText('${obsUrl}')">
                            <span><i class="fas fa-desktop"></i> OBS Ingest</span>
                            <i class="fas fa-copy"></i>
                        </div>
                        <div class="copy-link" onclick="window.open('${statsUrl}')">
                            <span><i class="fas fa-chart-line"></i> Se Full Stats</span>
                            <i class="fas fa-external-link-alt"></i>
                        </div>
                    </div>

                    <div class="visual-pulse">
                        <div class="pulse-bar"></div>
                    </div>
                </div>
            `;
        });

        startSimulatedStats();
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        // Enkel visuell feedback
        const btn = event.currentTarget;
        const original = btn.innerHTML;
        btn.innerHTML = '<span style="color: var(--green)">Kopiert til utklippstavle!</span>';
        setTimeout(() => btn.innerHTML = original, 2000);
    }

    function startSimulatedStats() {
        setInterval(() => {
            PATHS.forEach(p => {
                const br = (Math.random() * 3 + 4).toFixed(2);
                const rtt = Math.floor(Math.random() * 15 + 10);
                document.getElementById(`br-${p.id}`).innerText = br + " Mbps";
                document.getElementById(`rtt-${p.id}`).innerText = rtt + "ms";
                
                // Tilfeldig status-blink
                const badge = document.getElementById(`status-${p.id}`);
                if(Math.random() > 0.98) {
                    badge.className = 'status-badge offline';
                    badge.innerText = 'Reconnecting';
                } else {
                    badge.className = 'status-badge online';
                    badge.innerText = 'Live';
                }
            });
        }, 1500);
    }
</script>

</body>
</html>
