<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT.STEALTH | Enterprise Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --panel: #12121a;
            --accent: #00f2ff;
            --text: #e2e8f0;
            --dim: #64748b;
            --border: #232333;
            --red: #ff4757;
            --green: #2ed573;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 30px;
        }

        .header-area {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
        }

        .btn-add {
            background: var(--green); color: #000; border: none;
            padding: 10px 22px; border-radius: 8px; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* Tabell-oppsett inspirert av bildet ditt */
        .srt-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .srt-table th { text-align: left; padding: 0 20px; color: var(--dim); font-size: 0.7rem; text-transform: uppercase; }

        .stream-row { background: var(--panel); border: 1px solid var(--border); }
        .stream-row td { padding: 15px 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); vertical-align: middle; }
        .stream-row td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .stream-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }

        /* Metrics */
        .metric-box {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; text-align: center; min-width: 100px;
        }
        .metric-label { display: block; font-size: 0.6rem; color: var(--dim); margin-bottom: 3px; }
        .metric-value { font-family: 'JetBrains Mono', monospace; font-weight: bold; font-size: 0.95rem; }

        /* Lenke-seksjon (Mobil, OBS, Stats) */
        .link-container { display: flex; flex-direction: column; gap: 6px; width: 350px; }
        .link-row { display: flex; align-items: center; gap: 10px; background: #000; padding: 4px 8px; border-radius: 4px; border: 1px solid #222; }
        .link-info { font-size: 0.65rem; width: 85px; color: var(--dim); line-height: 1.1; }
        .link-url { font-size: 0.7rem; color: var(--accent); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
        
        .copy-btn { 
            background: #222; color: #fff; border: none; padding: 4px 8px; 
            border-radius: 3px; font-size: 0.6rem; font-weight: bold; cursor: pointer;
        }
        .copy-btn:hover { background: var(--accent); color: #000; }

        .btn-preview {
            background: rgba(0, 242, 255, 0.1); color: var(--accent); border: 1px solid var(--accent);
            padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
            margin-top: 10px; font-weight: bold;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .offline { background: var(--red); }

        .btn-delete { color: var(--red); background: none; border: none; cursor: pointer; font-size: 1.1rem; opacity: 0.4; }
        .btn-delete:hover { opacity: 1; }

        /* Preview Modal */
        #player-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; background: #000; border: 1px solid var(--accent); z-index: 1000; border-radius: 12px;
        }
        .modal-body { aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; background: #050505; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
    </style>
</head>
<body>

<div class="header-area">
    <div>
        <h1 style="margin:0; font-size: 1.6rem;">SRT.STEALTH <span style="font-weight: 200; color: var(--dim);">PRO HOST</span></h1>
        <p style="color: var(--dim); font-size: 0.8rem;">Global Port: 10001 | Status: Active</p>
    </div>
    <button class="btn-add" onclick="addPath()">
        <i class="fas fa-plus-circle"></i> ADD PATH
    </button>
</div>

<table class="srt-table">
    <thead>
        <tr>
            <th>Stream</th>
            <th>Status</th>
            <th>Bitrate & Preview</th>
            <th>OBS-Seere</th>
            <th>Lenker (Port 10001)</th>
            <th></th>
        </tr>
    </thead>
    <tbody id="main-content">
        </tbody>
</table>

<div class="overlay" onclick="closePlayer()"></div>
<div id="player-modal">
    <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
        <span id="modal-name" style="font-weight:bold; color:var(--accent);">PREVIEW</span>
        <i class="fas fa-times" onclick="closePlayer()" style="cursor:pointer;"></i>
    </div>
    <div class="modal-body">
        <div style="text-align:center;">
            <div class="online" style="width:12px; height:12px; margin:0 auto 10px;"></div>
            <div id="player-text" style="font-family: monospace; font-size: 0.9rem;">CONNECTING...</div>
        </div>
    </div>
</div>

<script>
    let paths = [
        { id: '1', user: 'Kristoffer_Live', status: 'online', bitrate: '6.2', viewers: 12 },
        { id: '2', user: 'Marius_IRL', status: 'online', bitrate: '4.5', viewers: 8 },
        { id: '3', user: 'Siri_Stream', status: 'offline', bitrate: '0.0', viewers: 0 }
    ];

    const SERVER = "oslo.srt.stealth";

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = paths.map(p => `
            <tr class="stream-row">
                <td>
                    <div style="font-weight: bold;">${p.user}</div>
                    <div style="font-size: 0.6rem; color: var(--dim);">ID: ${p.id}</div>
                </td>
                <td>
                    <span class="status-dot ${p.status}"></span>
                    <span style="font-size: 0.75rem; font-weight: 800; color: ${p.status === 'online' ? 'var(--green)' : 'var(--red)'}">
                        ${p.status.toUpperCase()}
                    </span>
                </td>
                <td style="width: 150px;">
                    <div class="metric-box">
                        <span class="metric-label">BITRATE</span>
                        <span class="metric-value">${p.bitrate} Mbps</span>
                    </div>
                    <button class="btn-preview" onclick="openPlayer('${p.user}')">
                        <i class="fas fa-play"></i> START PREVIEW
                    </button>
                </td>
                <td>
                    <div class="metric-box">
                        <span class="metric-label">OBS-SEERE</span>
                        <span class="metric-value">${p.viewers}</span>
                    </div>
                </td>
                <td>
                    <div class="link-container">
                        <div class="link-row">
                            <span class="link-info">📱 Mobil /<br>Backpack</span>
                            <span class="link-url">srt://${SERVER}:10001?streamid=pub_${p.user}</span>
                            <button class="copy-btn" onclick="copyText(this)">COPY</button>
                        </div>
                        <div class="link-row">
                            <span class="link-info">🎥 OBS<br>(read)</span>
                            <span class="link-url">srt://${SERVER}:10001?streamid=play_${p.user}</span>
                            <button class="copy-btn" onclick="copyText(this)">COPY</button>
                        </div>
                        <div class="link-row">
                            <span class="link-info">📊 Stats /<br>API</span>
                            <span class="link-url">http://stats.stealth.no/${p.user}</span>
                            <button class="copy-btn" onclick="copyText(this)">COPY</button>
                        </div>
                    </div>
                </td>
                <td>
                    <button class="btn-delete" onclick="deletePath('${p.id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function addPath() {
        const name = prompt("Navn på ny streamer:");
        if (name) {
            paths.push({
                id: Math.floor(Math.random() * 1000).toString(),
                user: name.trim().replace(/\s+/g, '_'),
                status: 'offline',
                bitrate: '0.0',
                viewers: 0
            });
            render();
        }
    }

    function deletePath(id) {
        if(confirm("Slette denne banen?")) {
            paths = paths.filter(p => p.id !== id);
            render();
        }
    }

    function openPlayer(name) {
        document.getElementById('modal-name').innerText = "LIVE: " + name;
        document.getElementById('player-modal').style.display = 'block';
        document.querySelector('.overlay').style.display = 'block';
        setTimeout(() => { document.getElementById('player-text').innerText = "RECEIVING SRT DATA..."; }, 1000);
        setTimeout(() => { document.getElementById('player-text').innerHTML = "<span style='color:var(--green)'>SIGNAL STABLE (1080p60)</span>"; }, 2500);
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.querySelector('.overlay').style.display = 'none';
        document.getElementById('player-text').innerText = "CONNECTING...";
    }

    function copyText(btn) {
        const text = btn.parentElement.querySelector('.link-url').innerText;
        navigator.clipboard.writeText(text);
        const old = btn.innerText;
        btn.innerText = "OK!";
        btn.style.background = "var(--green)";
        setTimeout(() => { btn.innerText = old; btn.style.background = ""; }, 1500);
    }

    render();
</script>
</body>
</html>
