<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT.STEALTH | Ultimate NOC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --panel: #12121a;
            --accent: #00f2ff;
            --text: #e2e8f0;
            --dim: #64748b;
            --border: #232333;
            --red: #ff4757;
            --green: #2ed573;
            --orange: #ffa502;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 25px;
        }

        /* --- SYSTEM TELEMETRY --- */
        .system-stats { display: flex; gap: 20px; margin-bottom: 25px; }
        .sys-card { background: var(--panel); border: 1px solid var(--border); padding: 15px 25px; border-radius: 12px; flex: 1; display: flex; align-items: center; gap: 15px; }
        .sys-icon { font-size: 1.5rem; color: var(--accent); background: rgba(0, 242, 255, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .sys-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: bold; }
        .sys-label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; }

        /* --- TABLE --- */
        .srt-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .srt-table th { text-align: left; padding: 0 20px; color: var(--dim); font-size: 0.7rem; text-transform: uppercase; }
        .stream-row { background: var(--panel); }
        .stream-row td { padding: 15px 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); vertical-align: middle; }
        .stream-row td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .stream-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }

        /* --- LOG CONTAINER (Sticky State) --- */
        .log-container { 
            display: none; background: #050508; border: 1px solid var(--border);
            margin-top: -10px; margin-bottom: 15px; border-radius: 0 0 12px 12px;
            padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            max-height: 150px; overflow-y: auto; border-top: none;
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-msg.error { color: var(--red); }
        .log-msg.warn { color: var(--orange); }
        .log-msg.info { color: var(--green); }

        /* --- LINK BOXES (BACK TO ORIGINAL) --- */
        .link-container { display: flex; flex-direction: column; gap: 6px; width: 360px; }
        .link-row { display: flex; align-items: center; gap: 10px; background: #000; padding: 4px 8px; border-radius: 4px; border: 1px solid #222; }
        .link-info { font-size: 0.65rem; width: 85px; color: var(--dim); line-height: 1.1; }
        .link-url { font-size: 0.7rem; color: var(--accent); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
        .copy-btn { background: #222; color: #fff; border: none; padding: 4px 8px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; cursor: pointer; min-width: 45px; }

        /* --- BUTTONS & STATUS --- */
        .metric-box { background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; min-width: 100px; }
        .btn-preview { background: rgba(0, 242, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .offline { background: var(--red); }
        .btn-log-toggle { background: #1a1a25; border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-log-toggle.active { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="system-stats">
    <div class="sys-card">
        <div class="sys-icon"><i class="fas fa-microchip"></i></div>
        <div class="sys-info"><span class="sys-label">CPU Belastning</span><span class="sys-value" id="total-cpu">--%</span></div>
    </div>
    <div class="sys-card">
        <div class="sys-icon"><i class="fas fa-upload"></i></div>
        <div class="sys-info"><span class="sys-label">Total Upload</span><span class="sys-value" id="total-upload">-- Mbps</span></div>
    </div>
</div>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 style="margin:0; font-size: 1.6rem;">SRT.STEALTH <span style="font-weight: 200; color: var(--dim);">ADMIN PANEL</span></h1>
    <button style="background:var(--green); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:800; cursor:pointer;" onclick="addPath()">+ ADD PATH</button>
</div>

<table class="srt-table">
    <thead>
        <tr>
            <th>Streamer</th>
            <th>Status</th>
            <th>Data & Preview</th>
            <th>OBS Seere</th>
            <th>Lenker (Port 10001)</th>
            <th>Verktøy</th>
        </tr>
    </thead>
    <tbody id="main-content"></tbody>
</table>

<script>
    let paths = [
        { id: '1', user: 'Kristoffer_Live', status: 'online', bitrate: '6.2', viewers: 12, logVisible: false, logs: [{t:'12:40', m:'Handshake OK', c:'info'}] },
        { id: '2', user: 'Marius_IRL', status: 'online', bitrate: '4.5', viewers: 8, logVisible: false, logs: [{t:'12:45', m:'Connection started', c:'info'}] }
    ];

    const SERVER = "oslo.srt.stealth";

    function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = paths.map(p => `
            <tr class="stream-row">
                <td>
                    <div style="font-weight: bold;">${p.user}</div>
                    <div style="font-size: 0.6rem; color: var(--dim);">ID: ${p.id}</div>
                </td>
                <td>
                    <span class="status-dot ${p.status}"></span>
                    <span style="font-size: 0.75rem; font-weight: 800; color: ${p.status === 'online' ? 'var(--green)' : 'var(--red)'}">${p.status.toUpperCase()}</span>
                </td>
                <td>
                    <div class="metric-box">
                        <span style="display:block; font-size:0.6rem; color:var(--dim);">BITRATE</span>
                        <span style="font-family:monospace; font-weight:bold;">${p.bitrate} Mbps</span>
                    </div>
                    <button class="btn-preview">MONITOR</button>
                </td>
                <td>
                    <div class="metric-box">
                        <span style="display:block; font-size:0.6rem; color:var(--dim);">SEERE</span>
                        <span style="font-family:monospace; font-weight:bold;">${p.viewers}</span>
                    </div>
                </td>
                <td>
                    <div class="link-container">
                        <div class="link-row">
                            <span class="link-info">📱 Mobil / Backpack</span>
                            <span class="link-url">srt://${SERVER}:10001?streamid=pub_${p.user}</span>
                            <button class="copy-btn" onclick="copy(this)">COPY</button>
                        </div>
                        <div class="link-row">
                            <span class="link-info">🎥 OBS (read)</span>
                            <span class="link-url">srt://${SERVER}:10001?streamid=play_${p.user}</span>
                            <button class="copy-btn" onclick="copy(this)">COPY</button>
                        </div>
                        <div class="link-row">
                            <span class="link-info">📊 Stats / API</span>
                            <span class="link-url">http://stats.stealth.no/${p.user}</span>
                            <button class="copy-btn" onclick="copy(this)">COPY</button>
                        </div>
                    </div>
                </td>
                <td>
                    <button class="btn-log-toggle ${p.logVisible ? 'active' : ''}" onclick="toggleLog('${p.id}')">
                        <i class="fas fa-terminal"></i> LOGG ${p.logVisible ? '▲' : '▼'}
                    </button>
                    <div style="margin-top:10px; text-align:center;">
                        <i class="fas fa-trash" style="color:#333; cursor:pointer;" onclick="deletePath('${p.id}')"></i>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="6" style="padding:0; border:none;">
                    <div class="log-container" id="log-${p.id}" style="display: ${p.logVisible ? 'block' : 'none'}">
                        ${p.logs.map(l => `<div class="log-entry"><span style="color:var(--dim)">[${l.t}]</span><span class="log-msg ${l.c}">${l.m}</span></div>`).join('')}
                    </div>
                </td>
            </tr>
        `).join('');
        
        // Oppdaterer system-bar
        const totalBW = paths.reduce((s, p) => s + parseFloat(p.bitrate), 0).toFixed(1);
        document.getElementById('total-upload').innerText = totalBW + " Mbps";
        document.getElementById('total-cpu').innerText = (Math.random() * 20 + 10).toFixed(0) + "%";
    }

    function toggleLog(id) {
        const path = paths.find(p => p.id === id);
        path.logVisible = !path.logVisible;
        render(); // Render på nytt for å holde tilstanden
    }

    function copy(btn) {
        const url = btn.parentElement.querySelector('.link-url').innerText;
        navigator.clipboard.writeText(url);
        btn.innerText = "OK!";
        btn.style.background = "var(--green)";
        setTimeout(() => { btn.innerText = "COPY"; btn.style.background = ""; }, 1500);
    }

    function addPath() {
        const n = prompt("Navn:");
        if(n) {
            paths.push({id: Date.now().toString(), user: n, status: 'offline', bitrate: '0.0', viewers: 0, logVisible: false, logs: [{t: 'NÅ', m: 'Opprettet bane', c: 'info'}]});
            render();
        }
    }

    function deletePath(id) {
        if(confirm("Slette?")) { paths = paths.filter(p => p.id !== id); render(); }
    }

    // Litt live log-simulering
    setInterval(() => {
        const p = paths[Math.floor(Math.random() * paths.length)];
        if(p && p.status === 'online') {
            const issues = [{m:'Jitter detektert', c:'warn'}, {m:'Pakketap 0.1%', c:'error'}, {m:'RTT stabilisert', c:'info'}];
            const issue = issues[Math.floor(Math.random() * issues.length)];
            p.logs.unshift({t: new Date().toLocaleTimeString('nb-NO', {hour:'2-digit', minute:'2-digit'}), m: issue.m, c: issue.c});
            if(p.logs.length > 5) p.logs.pop();
            render();
        }
    }, 8000);

    render();
</script>
</body>
</html>
